<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>欢迎页</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f0f9ff, #dbeafe);
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      }
      .card {
        padding: 28px 36px;
        border-radius: 14px;
        background: #ffffff;
        box-shadow: 0 12px 28px rgba(30, 64, 175, 0.15);
        text-align: center;
      }
      h1 {
        margin: 0;
        color: #1e3a8a;
        font-size: 34px;
        letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>欢迎来到北京</h1>
    </main>
  </body>
</html>
